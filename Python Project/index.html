<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduManage — School Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./CSS/style.css"/>
</head>
<body>
  <div id="app">
    <!-- LOGIN PAGE -->
    <div id="page-login" class="page active">
      <div class="login-bg">
        <div class="login-grid-overlay"></div>
        <div class="login-card">
          <div class="login-brand">
            <div class="brand-icon">🎓</div>
            <h1>EduManage</h1>
            <p>School Management System</p>
          </div>
          <form id="login-form" class="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label>Username</label>
              <input type="text" id="login-username" placeholder="admin or teacher name" required/>
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="login-password" placeholder="Enter password" required/>
            </div>
            <div id="login-error" class="error-msg hidden"></div>
            <button type="submit" class="btn-primary full-width">
              <span class="btn-text">Sign In</span>
              <span class="btn-loader hidden">⟳</span>
            </button>
          </form>
          <p class="login-hint">Default admin: <strong>admin / admin123</strong></p>
        </div>
      </div>
    </div>

    <!-- MAIN APP -->
    <div id="page-app" class="page hidden">
      <!-- SIDEBAR -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-brand">
          <div class="brand-icon">🎓</div>
          <span>EduManage</span>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-section">
            <span class="nav-section-label">Overview</span>
            <a href="#" class="nav-item active" data-page="dashboard">
              <span class="nav-icon">📊</span><span>Dashboard</span>
            </a>
          </div>
          <div class="nav-section" id="admin-nav">
            <span class="nav-section-label">Management</span>
            <a href="#" class="nav-item" data-page="classes">
              <span class="nav-icon">🏫</span><span>Classes</span>
            </a>
            <a href="#" class="nav-item" data-page="students">
              <span class="nav-icon">👨‍🎓</span><span>Students</span>
            </a>
            <a href="#" class="nav-item" data-page="teachers">
              <span class="nav-icon">👨‍🏫</span><span>Teachers</span>
            </a>
            <a href="#" class="nav-item" data-page="assignments">
              <span class="nav-icon">📋</span><span>Assignments</span>
            </a>
            <a href="#" class="nav-item" data-page="salary">
              <span class="nav-icon">💰</span><span>Salary</span>
            </a>
          </div>
          <div class="nav-section">
            <span class="nav-section-label">Academic</span>
            <a href="#" class="nav-item" data-page="attendance">
              <span class="nav-icon">✅</span><span>Attendance</span>
            </a>
            <a href="#" class="nav-item" data-page="exams">
              <span class="nav-icon">📝</span><span>Exams & Marks</span>
            </a>
            <a href="#" class="nav-item" data-page="report">
              <span class="nav-icon">📄</span><span>Report Card</span>
            </a>
          </div>
        </nav>
        <div class="sidebar-footer">
          <div class="user-info">
            <div class="user-avatar" id="user-avatar">A</div>
            <div>
              <div class="user-name" id="user-name">Admin</div>
              <div class="user-role" id="user-role">Administrator</div>
            </div>
          </div>
          <button class="btn-logout" onclick="logout()">↩</button>
        </div>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="main-content">
        <div id="content-area"></div>
      </main>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button onclick="closeModal()" class="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>
    <script src="./JS/api.js"></script>
    <script src="./JS/app.js"></script>
    <script src="./JS/assignments.js"></script>
    <script src="./JS/attendance.js"></script>
    <script src="./JS/classes.js"></script>
    <script src="./JS/dashboard.js"></script>
    <script src="./JS/exams.js"></script>
    <script src="./JS/report.js"></script>
    <script src="./JS/salary.js"></script>
    <script src="./JS/students.js"></script>
    <script src="./JS/teachers.js"></script>
    <script src="./JS/utils.js"></script>
</body>
</html>
